name: Marcadores en vivo

# Refresca los torneos en curso y los marcadores en vivo cada 15 minutos, desde
# ESPN (site.api.espn.com). Es la misma fuente que usa el proyecto de fútbol.
#
# ESPN es GRATIS y sin cuota, así que este workflow puede correr a menudo sin
# gastar créditos de ninguna API. Cubre ATP y WTA de circuito principal,
# incluidos los torneos 250 — pero NO Challenger (no existe en ninguna fuente).
#
# Los marcadores son set por set. Solo hay datos cuando hay torneos en curso.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: en-vivo-turso
  cancel-in-progress: true

jobs:
  scores:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Refrescar torneos y marcadores en vivo (ESPN)
        run: npx tsx scripts/espn-ingest.ts
