name: Ingesta diaria

# Turso es SOLO base de datos: no tiene pg_cron ni Edge Functions, así que el
# trabajo programado vive aquí y no dentro de la base (en el proyecto de fútbol
# lo hacía pg_cron + pg_net dentro de Supabase).
#
# Se eligió GitHub Actions en vez de Vercel Cron porque este job descarga los
# ficheros de la temporada, parsea miles de partidos y reentrena el Elo: no cabe
# en el límite de tiempo de una función serverless del plan Hobby.
#
# Secrets necesarios en el repositorio:
#   TURSO_DATABASE_URL   libsql://<bd>-<org>.turso.io
#   TURSO_AUTH_TOKEN     token de Turso (acceso total: no hay RLS)

on:
  schedule:
    # 06:30 UTC. La fuente publica el fichero de la temporada una vez al día.
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      reset_elo:
        description: 'Reentrenar el Elo desde cero (necesario si la fuente corrigió resultados)'
        type: boolean
        default: false

concurrency:
  # Dos ingestas simultáneas escribirían el Elo a la vez: se serializan.
  group: ingesta-turso
  cancel-in-progress: false

jobs:
  ingesta:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Comprobar que hay base configurada
        run: |
          if [ -z "$TURSO_DATABASE_URL" ]; then
            echo "Falta el secret TURSO_DATABASE_URL." >&2
            exit 1
          fi

      - name: Migraciones
        run: npm run db:migrate

      - name: Ingesta de la temporada en curso
        # Solo el año actual: las temporadas cerradas ya no cambian y bajarlas
        # todos los días sería tirar ancho de banda de la fuente.
        run: npm run db:ingest -- --from $(date -u +%Y) --force

      - name: Reconciliar programados con jugados
        # Antes de nada: los partidos que ya se jugaron dejan de ser 'scheduled'
        # y sus cuotas y apuestas se mueven a la fila definitiva. Si no, las
        # apuestas simuladas apuntarían a un partido sin resultado y nunca se
        # liquidarían.
        run: npx tsx scripts/reconcile.ts

      - name: Torneos en curso y calendario (ESPN)
        # Fuente gratuita de los torneos que se juegan AHORA (incluidos los 250
        # que The Odds API no cubre), su calendario y los marcadores en vivo.
        run: npx tsx scripts/espn-ingest.ts

      - name: Cuotas de partidos futuros (The Odds API)
        # Solo para el Paper Trading: cuotas reales de torneos cubiertos. Sin
        # ODDS_API_KEY es un no-op; en semanas sin torneos cubiertos no gasta
        # ni un crédito. NO es la fuente de calendario (eso lo da ESPN).
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npx tsx scripts/odds-ingest.ts

      - name: Entrenar Elo y calcular features
        run: |
          if [ "${{ inputs.reset_elo }}" = "true" ]; then
            npm run db:elo -- --reset
          else
            npm run db:elo
          fi

      - name: Predecir los partidos nuevos
        # Aplica los pesos YA ajustados; NO reajusta el modelo. Reajustar a
        # diario lo iría cambiando solo, en silencio, y ninguna métrica
        # publicada seguiría siendo comparable con la del día anterior.
        # Reajustar es una decisión explícita: scripts/fit-model.ts.
        run: |
          if [ "${{ inputs.reset_elo }}" = "true" ]; then
            npx tsx scripts/predict.ts --all
          else
            npx tsx scripts/predict.ts
          fi

      - name: Paper Trading (simulado, modo auditoría)
        # Coloca apuestas FICTICIAS sobre partidos con cuota real y liquida las
        # ya resueltas. No ejecuta nada real ni habla con ninguna casa.
        run: npx tsx scripts/paper-trade.ts

      - name: Evaluación contra el mercado
        # No falla el job: es un informe que queda en el log para vigilar que el
        # modelo no se degrade en silencio.
        run: npx tsx scripts/evaluate.ts || true
